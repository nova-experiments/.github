name: Improvement
description: A small enhancement to existing behavior. Not a new feature — existing functionality made better.
title: "[Improvement] "
labels: ["improvement"]
type: Improvement
body:
  - type: markdown
    attributes:
      value: |
        > An improvement must link to a parent **Other Work** issue in the `roadmap` repo.
        > This will be enforced during PR checks, so please ensure the parent issue is linked correctly.
        > If the scope has grown beyond a small enhancement, consider opening a Feature instead.

  - type: textarea
    id: proposed-behavior
    attributes:
      label: Proposed Improvement
      description: What should it do instead, and why is that better?
    validations:
      required: true

  - type: textarea
    id: expected-business-value
    attributes:
      label: Expected Business Value
      description: Why is this improvement worth doing? How does it benefit users or the business?
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Links, screenshots, related issues, or dependencies.