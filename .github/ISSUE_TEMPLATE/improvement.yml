name: Improvement
description: A small enhancement to existing behavior. Not a new feature — existing functionality made better.
title: "[Improvement] "
labels: ["improvement"]
type: Improvement
body:
  - type: markdown
    attributes:
      value: |
        > **Before submitting:** an improvement must link to a parent **Other Work** issue in the `roadmap` repo.
        > If the scope has grown beyond a small enhancement, consider opening a Feature instead.

  - type: input
    id: parent-issue
    attributes:
      label: Parent Other Work Issue Number
      description: Issue number of the parent Other Work issue in the roadmap repo.
      placeholder: "123"
    validations:
      required: true

  - type: textarea
    id: current-behavior
    attributes:
      label: Current Behavior
      description: What does it do today?
    validations:
      required: true

  - type: textarea
    id: proposed-behavior
    attributes:
      label: Proposed Improvement
      description: What should it do instead, and why is that better?
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Links, screenshots, related issues, or dependencies.