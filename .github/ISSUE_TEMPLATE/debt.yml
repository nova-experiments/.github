name: Debt
description: Technical debt or architecture cleanup. Uses the chore/ branch type.
title: "[Debt] "
labels: ["debt"]
type: Debt
body:
  - type: markdown
    attributes:
      value: |
        > Debt must link to a parent **Other Work** issue in the `roadmap` repo. 
        > Will be enforced during PR checks, so please ensure the parent issue is linked correctly.
        > Use a `chore/` branch for the PR that resolves this.

  - type: textarea
    id: problem
    attributes:
      label: What is the debt?
      description: Describe what is messy, fragile, or wrong — and why it matters now.
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: How does this debt affect development speed, reliability, or correctness?
    validations:
      required: true

  - type: textarea
    id: proposed-approach
    attributes:
      label: Proposed Approach
      description: How should this be cleaned up?
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Links, related issues, or prior attempts.