name: Task
description: A concrete unit of implementation work (typically a PR). Belongs to a Feature or Major Task.
title: "[Task] "
labels: ["task"]
type: Task
body:
  - type: markdown
    attributes:
      value: |
        > A task must link to a parent issue in the `roadmap` repo.
        > A PR that touches more than one story is a signal the PR should be split or the stories merged.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What needs to be done and why?
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Links, related issues, or implementation notes.