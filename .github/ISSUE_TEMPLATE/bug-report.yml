name: Bug Report
description: Report a bug in the product. Must link to a parent issue in the roadmap repo.
title: "[Bug] "
labels: ["bug"]
type: Bug
body:
  - type: markdown
    attributes:
      value: |
        > Every bug must trace back to a parent issue in the `roadmap` repo.
        > Feature track bug → parent is a **Feature** issue
        > Other Work track bug → parent is an **Other Work** issue
        > This will be enforced during PR checks, so please ensure the parent issue is linked correctly.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear, concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Go to '...'
        2. Click '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: Include error messages or screenshots if available.

  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, browser, app version, or other relevant context.
      placeholder: "e.g. macOS 15, Chrome 125, Nova v2.3.1"

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Logs, screenshots, related issues, or anything else useful.