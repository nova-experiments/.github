name: Story
description: A user-facing unit of work scoped to a feature. Must complete within one week.
title: "[Story] "
labels: ["story"]
type: Story
body:
  - type: markdown
    attributes:
      value: |
        > **Before submitting:** a story must link to a parent **Feature** issue in the `roadmap` repo.
        > A story that cannot be completed within a week should be split.

  - type: input
    id: parent-issue
    attributes:
      label: Parent Feature Number
      description: Issue number of the parent Feature issue in the roadmap repo.
      placeholder: "123"
    validations:
      required: true

  - type: dropdown
    id: assigned-team
    attributes:
      label: Assigned Team
      description: Team responsible for this story.
      options:
        - "Core HR + EDM"
        - "AI Platform, Advisor, Super Agent"
        - "Special Agents and Integrations"
        - "Operations"
        - "Other"
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What needs to be built, from the user's perspective.
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: How do we know this story is done?
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Links, mockups, related issues, or dependencies.