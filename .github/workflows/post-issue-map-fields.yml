name: Map Issue Form Fields to Project

on:
  workflow_call:
    secrets:
      token:
        required: true

jobs:
  map-fields:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        env:
          PROJECT_NUMBER: ${{ vars.ROADMAP_PROJECT_NUMBER }}
          ORG: nova-experiments
        with:
          github-token: ${{ secrets.token }}
          script: |
            const body = context.payload.issue.body || '';
            const issueNodeId = context.payload.issue.node_id;
            const org = process.env.ORG;
            const projectNumber = parseInt(process.env.PROJECT_NUMBER);

            // GitHub issue forms produce sections: ### Label\n\nvalue\n\n### Next
            function parseField(label) {
              const escaped = label.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
              const regex = new RegExp(`###\\s+${escaped}\\s*\\n+([^#]+?)(?=\\n###|$)`, 'is');
              const match = body.match(regex);
              return match ? match[1].trim() : null;
            }

            const parentIssue = parseField('Parent Issue');
            const rawTrack    = parseField('Track');
            const rawTeam     = parseField('Assigned Team') || parseField('Affected Team');

            // Strip the description after the em dash in dropdown values
            // e.g. "Feature — bug found while delivering a feature" → "Feature"
            const track = rawTrack?.split('—')[0].trim() ?? null;
            const team  = rawTeam?.trim() ?? null;

            // Issue type is set by the template's `type:` frontmatter field
            const issueType = context.payload.issue.type?.name ?? null;

            const { organization: { projectV2: project } } = await github.graphql(`
              query($org: String!, $number: Int!) {
                organization(login: $org) {
                  projectV2(number: $number) {
                    id
                    fields(first: 30) {
                      nodes {
                        ... on ProjectV2Field { id name }
                        ... on ProjectV2SingleSelectField {
                          id name
                          options { id name }
                        }
                      }
                    }
                  }
                }
              }
            `, { org, number: projectNumber });

            const projectId = project.id;
            const fields = project.fields.nodes;
            const getField = name => fields.find(f => f.name === name);

            // Add issue to project; no-op if it's already a member
            const { addProjectV2ItemById: { item } } = await github.graphql(`
              mutation($projectId: ID!, $contentId: ID!) {
                addProjectV2ItemById(input: { projectId: $projectId, contentId: $contentId }) {
                  item { id }
                }
              }
            `, { projectId, contentId: issueNodeId });
            const itemId = item.id;

            async function setSingleSelect(fieldName, value) {
              const field = getField(fieldName);
              if (!field || !value) return;
              const option = field.options?.find(o => o.name === value);
              if (!option) return;
              await github.graphql(`
                mutation($p: ID!, $i: ID!, $f: ID!, $o: String!) {
                  updateProjectV2ItemFieldValue(input: {
                    projectId: $p, itemId: $i, fieldId: $f,
                    value: { singleSelectOptionId: $o }
                  }) { projectV2Item { id } }
                }
              `, { p: projectId, i: itemId, f: field.id, o: option.id });
            }

            async function setText(fieldName, value) {
              const field = getField(fieldName);
              if (!field || !value) return;
              await github.graphql(`
                mutation($p: ID!, $i: ID!, $f: ID!, $t: String!) {
                  updateProjectV2ItemFieldValue(input: {
                    projectId: $p, itemId: $i, fieldId: $f,
                    value: { text: $t }
                  }) { projectV2Item { id } }
                }
              `, { p: projectId, i: itemId, f: field.id, t: value });
            }

            // Resolve parent issue reference to a node ID.
            // Handles: full URL, owner/repo#number, or bare number (assumed roadmap repo).
            async function resolveParentNodeId(ref) {
              if (!ref) return null;
              let owner, repo, number;

              const urlMatch = ref.match(/github\.com\/([^/]+)\/([^/]+)\/issues\/(\d+)/);
              const crossMatch = ref.match(/^([^/]+)\/([^#]+)#(\d+)$/);
              const bareMatch = ref.match(/^(\d+)$/);

              if (urlMatch)        [, owner, repo, number] = urlMatch;
              else if (crossMatch) [, owner, repo, number] = crossMatch;
              else if (bareMatch)  { owner = 'nova-experiments'; repo = 'Roadmap'; number = bareMatch[1]; }
              else return null;

              const { repository: { issue } } = await github.graphql(`
                query($owner: String!, $repo: String!, $number: Int!) {
                  repository(owner: $owner, name: $repo) {
                    issue(number: $number) { id }
                  }
                }
              `, { owner, repo, number: parseInt(number) });
              return issue?.id ?? null;
            }

            const parentNodeId = await resolveParentNodeId(parentIssue);

            await Promise.all([
              setSingleSelect('Track', track),
              // Feature Sets span multiple teams — team attribution lives on child Features
              issueType !== 'Feature Set' && setSingleSelect('Team', team),
              setSingleSelect('Type', issueType),
              setText('Parent Issue', parentIssue),
              parentNodeId && github.graphql(`
                mutation($parentId: ID!, $childId: ID!) {
                  addSubIssue(input: { issueId: $parentId, subIssueId: $childId }) {
                    issue { id }
                  }
                }
              `, { parentId: parentNodeId, childId: issueNodeId }),
            ]);