name: PR Parent Issue Check

on:
  workflow_call:
    secrets:
      token:
        required: true

jobs:
  check-parent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        env:
          ORG: nova-experiments
          ROADMAP_PROJECT_NUMBER: ${{ vars.ROADMAP_PROJECT_NUMBER }}
          PARKING_LOT_PROJECT_NUMBER: ${{ vars.PARKING_LOT_PROJECT_NUMBER }}
        with:
          github-token: ${{ secrets.token }}
          script: |
            const org = process.env.ORG;
            const roadmapRepo = 'Roadmap';
            const roadmapProjectNumber = parseInt(process.env.ROADMAP_PROJECT_NUMBER);
            const parkingLotProjectNumber = parseInt(process.env.PARKING_LOT_PROJECT_NUMBER);

            const prBody = context.payload.pull_request.body || '';
            const prNumber = context.payload.pull_request.number;
            const repo = context.payload.repository.name;

            // Extract linked issue numbers from PR body
            // Matches: closes #123, fixes org/repo#123, resolves #123, part of #123
            const linkedRefs = [
              ...prBody.matchAll(/(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?|part\s+of)\s+(?:([a-z0-9_.-]+)\/([a-z0-9_.-]+))?#(\d+)/gi)
            ].map(m => ({
              owner: m[1] || org,
              repo:  m[2] || repo,
              number: parseInt(m[3]),
            }));

            const warnings = [];

            if (linkedRefs.length === 0) {
              warnings.push('This PR has no linked issues. All PRs must reference an issue that traces back to a parent in the roadmap repo.');
            }

            // Fetch project membership for roadmap and parking lot
            async function getProjectIssueIds(projectNumber) {
              const data = await github.graphql(`
                query($org: String!, $number: Int!) {
                  organization(login: $org) {
                    projectV2(number: $number) {
                      items(first: 100) {  # max per page — pagination needed if project exceeds 100 items
                        nodes {
                          content { ... on Issue { id } }
                        }
                      }
                    }
                  }
                }
              `, { org, number: projectNumber });
              return new Set(
                data.organization.projectV2.items.nodes
                  .map(n => n.content?.id)
                  .filter(Boolean)
              );
            }

            const [inRoadmapProject, inParkingLot] = await Promise.all([
              getProjectIssueIds(roadmapProjectNumber),
              getProjectIssueIds(parkingLotProjectNumber),
            ]);

            for (const ref of linkedRefs) {
              const { data: issue } = await github.rest.issues.get({
                owner: ref.owner,
                repo: ref.repo,
                issue_number: ref.number,
              });

              // Fetch the parent via GitHub's native sub-issues relationship
              const { node } = await github.graphql(`
                query($id: ID!) {
                  node(id: $id) {
                    ... on Issue {
                      parent {
                        id
                        number
                        url
                        repository { name owner { login } }
                      }
                    }
                  }
                }
              `, { id: issue.node_id });

              const parent = node?.parent;

              if (!parent) {
                warnings.push(
                  `[${ref.owner}/${ref.repo}#${ref.number}](${issue.html_url}) has no parent issue set. ` +
                  `Every issue must trace back to a parent in the \`${roadmapRepo}\` repo.`
                );
                continue;
              }

              if (parent.repository.name !== roadmapRepo || parent.repository.owner.login !== org) {
                warnings.push(
                  `[${ref.owner}/${ref.repo}#${ref.number}](${issue.html_url})'s parent ` +
                  `[${parent.repository.name}#${parent.number}](${parent.url}) is not in the \`${roadmapRepo}\` repo.`
                );
                continue;
              }

              if (inParkingLot.has(parent.id)) {
                warnings.push(
                  `[${ref.owner}/${ref.repo}#${ref.number}](${issue.html_url})'s parent ` +
                  `[${roadmapRepo}#${parent.number}](${parent.url}) is in the **Parking Lot** — ` +
                  `it has not been scheduled. Confirm this work is intentional before merging.`
                );
              } else if (!inRoadmapProject.has(parent.id)) {
                warnings.push(
                  `[${ref.owner}/${ref.repo}#${ref.number}](${issue.html_url})'s parent ` +
                  `[${roadmapRepo}#${parent.number}](${parent.url}) is not assigned to any project. ` +
                  `Add it to a project before merging.`
                );
              }
            }

            if (warnings.length === 0) return;

            // Update existing bot comment rather than adding a new one on every push
            const { data: comments } = await github.rest.issues.listComments({
              owner: org,
              repo,
              issue_number: prNumber,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('<!-- pr-parent-check -->')
            );

            const body = [
              '<!-- pr-parent-check -->',
              '### :warning: PR Parent Issue Check',
              '',
              ...warnings.map(w => `- ${w}`),
            ].join('\n');

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: org,
                repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: org,
                repo,
                issue_number: prNumber,
                body,
              });
            }